<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Garage Legends – Motorsport Management</title>
  <meta name="description" content="Build a racing team from a humble garage to the pinnacle of motorsport. Manage drivers, develop your car, attract sponsors and conquer the divisions in Garage Legends.">
  <link rel="icon" type="image/svg+xml" data-href="favicon">
  <script>
    // Inline favicon as SVG
    const svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="#e8292a"/><text y=".9em" font-size="80" x="10">🏎️</text></svg>';
    const link = document.createElement('link');
    link.rel = 'icon';
    link.href = 'data:image/svg+xml,' + encodeURIComponent(svg);
    document.head.appendChild(link);
  </script>
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/onboarding.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/auth.css">
  <script>
    window.addEventListener('error', function (event) {
      var existing = document.getElementById('boot-error-overlay');
      if (existing) return;
      var overlay = document.createElement('div');
      overlay.id = 'boot-error-overlay';
      overlay.style.cssText = 'position:fixed;inset:0;z-index:99999;background:rgba(10,11,15,0.96);color:#f5f7fa;padding:24px;font-family:monospace;overflow:auto';
      overlay.innerHTML = '<h2 style="margin:0 0 12px;color:#ff6b6b">Frontend boot error</h2>' +
        '<div style="margin-bottom:8px;color:#cbd5e1">' + String(event.message || 'Unknown error') + '</div>' +
        '<div style="color:#94a3b8">' + String(event.filename || '') + (event.lineno ? ':' + event.lineno : '') + (event.colno ? ':' + event.colno : '') + '</div>';
      document.body.appendChild(overlay);
    });
  </script>
</head>
<body>

<!-- ===== ONBOARDING (shown first if new player) ===== -->
<div id="onboarding-screen" style="display:flex"></div>

<!-- ===== MAIN APP SHELL (hidden until onboarding complete) ===== -->
<div id="app" style="display:none">

  <!-- TOPBAR -->
  <div id="topbar"></div>

  <!-- SIDEBAR -->
  <nav id="sidebar"></nav>

  <!-- MAIN CONTENT -->
  <main id="main">

    <!-- DASHBOARD -->
    <div id="screen-dashboard" class="screen active"></div>

    <!-- GARAGE SCREEN -->
    <div id="screen-garage" class="screen"></div>

    <!-- PILOTS SCREEN -->
    <div id="screen-pilots" class="screen"></div>

    <!-- STAFF SCREEN -->
    <div id="screen-staff" class="screen"></div>

    <!-- CAR DEV SCREEN -->
    <div id="screen-car" class="screen"></div>

    <!-- CALENDAR SCREEN -->
    <div id="screen-calendar" class="screen"></div>

    <!-- STANDINGS SCREEN -->
    <div id="screen-standings" class="screen"></div>

    <!-- FINANCES SCREEN -->
    <div id="screen-finances" class="screen"></div>

    <!-- MARKET SCREEN -->
    <div id="screen-market" class="screen"></div>

    <!-- PRE-RACE SCREEN -->
    <div id="screen-prerace" class="screen"></div>

    <!-- RACE SCREEN -->
    <div id="screen-race" class="screen"></div>

    <!-- POST-RACE SCREEN -->
    <div id="screen-postrace" class="screen"></div>

    <!-- MI EQUIPO SCREEN -->
    <div id="screen-mi-equipo" class="screen"></div>

    <!-- ADMIN SCREEN -->
    <div id="screen-admin" class="screen"></div>

  </main>
</div>

<!-- FLOATING NAV MENU (mobile) -->
<div class="fab-menu-overlay" id="fab-overlay" onclick="GL_APP.toggleFabMenu()"></div>
<button class="fab-menu-btn" id="fab-menu-btn" onclick="GL_APP.toggleFabMenu()" aria-label="Navigation menu">☰</button>
<div class="fab-nav-panel" id="fab-nav-panel"></div>

<!-- TOAST CONTAINER -->
<div id="toast-container"></div>

<!-- ===== SCRIPTS (load order matters) ===== -->
<script src="js/i18n.js"></script>
<script src="js/game_constants.js"></script>
<!-- Firebase SDKs (compat v9) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script src="js/state.js"></script>
<script src="shared/data-constants.js"></script>
<script src="shared/engine-core.js"></script>
<script src="js/data.js"></script>
<script src="js/divisions.js"></script>
<script src="js/economy.js"></script>
<script src="js/academy.js"></script>
<script src="js/engine.js"></script>
<script src="js/ui.js"></script>
<script src="js/onboarding.js"></script>
<script src="js/team-profile.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/screens.js"></script>
<script src="js/admin.js"></script>
<script src="js/app.js"></script>

</body>
</html>
